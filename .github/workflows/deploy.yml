name: Deploy to Digital Ocean

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        run: |
          docker build -f Dockerfile.prod -t epi-meta-backend:latest .

      - name: Build frontend image
        run: |
          cd frontend
          docker build -f Dockerfile.prod -t epi-meta-frontend:latest .

